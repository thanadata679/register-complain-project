<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Complaints</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="page-admin-dashboard">

  <header>
    <h1>Admin Dashboard</h1>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </header>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>User Info</th>
          <th>Complaint Details</th>
          <th>AI Interaction</th>
          <th>Status & Comment</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <!-- Rows rendered by JS -->
      </tbody>
    </table>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="comment-modal">
    <div class="modal">
      <h2>Add/Edit Status Comment</h2>
      <textarea id="admin-comment-input" placeholder="Enter your response or status update here..."></textarea>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn btn-save" onclick="saveComment()">Save Comment</button>
      </div>
    </div>
  </div>

  <script>
    const STORE_KEY = 'complaints_v1';
    let currentEditId = null;

    function loadComplaints() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function saveComplaints(data) {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    function formatDate(iso) {
      if (!iso) return 'N/A';
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        + '<br/>' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderTable() {
      const all = loadComplaints();
      const tbody = document.getElementById('table-body');

      if (!all.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 3rem; color: var(--muted);">No complaints registered yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = all.map(c => {
        const hasComment = !!c.adminComment;
        return `
        <tr>
          <td class="col-date">${formatDate(c.timestamp)}</td>
          <td>
            <div class="col-name">${escHtml(c.name)}</div>
            <div class="col-contact">${escHtml(c.city)}<br/>📱 ${escHtml(c.mobile)}</div>
          </td>
          <td class="col-details">${escHtml(c.complaint)}</td>
          <td class="col-ai">
            ${c.aiQuestion ? `
              <div class="ai-box">
                <strong>Q:</strong> ${escHtml(c.aiQuestion)}
              </div>
              <div class="ai-box" style="border-left-color: var(--accent1); background: rgba(108, 99, 255, 0.08);">
                <strong style="color: var(--accent1);">A:</strong> ${escHtml(c.aiAnswer)}
              </div>
            ` : '<span style="color: var(--muted);">N/A</span>'}
          </td>
          <td class="col-status">
            ${hasComment 
              ? `<span class="status-badge status-reviewed">Reviewed</span>
                 <div class="comment-text">${escHtml(c.adminComment)}</div>`
              : `<span class="status-badge status-pending">Pending</span>`
            }
          </td>
          <td>
            <div class="action-btns">
              <button class="btn btn-comment" onclick="openModal('${c.id}')">${hasComment ? 'Edit Comment' : 'Add Comment'}</button>
              <button class="btn btn-del" onclick="deleteComplaint('${c.id}')">Delete</button>
            </div>
          </td>
        </tr>
        `;
      }).join('');
    }

    function deleteComplaint(id) {
      if (confirm('Are you sure you want to delete this complaint?')) {
        const data = loadComplaints().filter(c => c.id !== id);
        saveComplaints(data);
        renderTable();
      }
    }

    function openModal(id) {
      currentEditId = id;
      const data = loadComplaints();
      const complaint = data.find(c => c.id === id);
      const input = document.getElementById('admin-comment-input');
      
      if (complaint && complaint.adminComment) {
        input.value = complaint.adminComment;
      } else {
        input.value = '';
      }
      
      document.getElementById('comment-modal').classList.add('active');
      input.focus();
    }

    function closeModal() {
      document.getElementById('comment-modal').classList.remove('active');
      currentEditId = null;
    }

    function saveComment() {
      if (!currentEditId) return;
      const text = document.getElementById('admin-comment-input').value.trim();
      
      const data = loadComplaints();
      const idx = data.findIndex(c => c.id === currentEditId);
      if (idx !== -1) {
        data[idx].adminComment = text;
        saveComplaints(data);
        renderTable();
      }
      closeModal();
    }

    function logout() {
      window.location.href = 'admin-login.html';
    }

    // Init
    renderTable();

  </script>
</body>

</html>
